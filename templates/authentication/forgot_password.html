{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>Forgot Password - EduSphere</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #667eea 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Animated background */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-40px) translateX(30px); }
        }
        
        .forgot-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        
        .forgot-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 35px 25px;
            text-align: center;
            position: relative;
        }
        
        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 25s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .card-header i {
            font-size: 55px;
            color: white;
            background: rgba(255,255,255,0.2);
            width: 90px;
            height: 90px;
            line-height: 90px;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        
        .card-header h2 {
            font-size: 28px;
            color: white;
            margin-bottom: 8px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }
        
        .card-header p {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        
        /* Mobile Brand - Only visible on mobile */
        .mobile-brand {
            display: none;
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }
        
        .mobile-brand h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e3c72;
        }
        
        .mobile-brand span {
            color: #ffd700;
        }
        
        .card-body {
            padding: 35px 30px;
        }
        
        .info-box {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #2a5298;
        }
        
        .info-box i {
            font-size: 20px;
            color: #2a5298;
        }
        
        .info-box p {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.1);
        }
        
        .btn-send {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.35);
        }
        
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        
        .back-link a {
            color: #2a5298;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        
        .alert i {
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            .mobile-brand {
                display: block;
            }
        }
        
        @media (max-width: 480px) {
            .card-body { padding: 25px 20px; }
            .card-header { padding: 30px 20px; }
            .card-header i { font-size: 45px; width: 75px; height: 75px; line-height: 75px; }
            .card-header h2 { font-size: 24px; }
            .info-box { padding: 12px; }
            .info-box p { font-size: 12px; }
            .mobile-brand h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bubble" style="width: 250px; height: 250px; top: -80px; left: -80px;"></div>
        <div class="bubble" style="width: 180px; height: 180px; bottom: -60px; right: -60px; animation-delay: 3s;"></div>
        <div class="bubble" style="width: 120px; height: 120px; top: 40%; right: 5%; animation-duration: 15s;"></div>
        <div class="bubble" style="width: 80px; height: 80px; bottom: 15%; left: 8%; animation-delay: 5s;"></div>
    </div>
    
    <div class="forgot-container">
        <div class="forgot-card">
            <div class="card-header">
                <i class="fas fa-key"></i>
                <h2>Forgot Password?</h2>
                <p>We'll send you a reset link</p>
            </div>
            
            <div class="card-body">
                <!-- Mobile Brand - Only visible on mobile screens -->
                <div class="mobile-brand">
                    <h2>Edu<span>Sphere</span></h2>
                </div>
                
                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}error{% elif message.tags == 'info' %}info{% else %}success{% endif %}">
                            <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'info' %}info-circle{% else %}check-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                <!-- Info Box -->
                <div class="info-box">
                    <i class="fas fa-envelope"></i>
                    <p>Enter your registered email address to receive a password reset link.</p>
                </div>
                
                <!-- Forgot Password Form -->
                <form method="POST" action="{% url 'forgot_password' %}">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-send">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>
                
                <div class="back-link">
                    <a href="{% url 'login' %}">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
